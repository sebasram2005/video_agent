name: Generate & Upload Video

on:
  schedule:
    - cron: '0 13 * * *'   # 9:00 AM ET  (primary)
    - cron: '45 13 * * *'  # 9:45 AM ET  (backup — GitHub crons can drift)
    - cron: '0 17 * * *'   # 1:00 PM ET  (primary)
    - cron: '45 17 * * *'  # 1:45 PM ET  (backup)
    - cron: '0 21 * * *'   # 5:00 PM ET  (primary)
    - cron: '45 21 * * *'  # 5:45 PM ET  (backup)
  workflow_dispatch:         # manual desde GitHub UI

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check queue
        id: check
        run: |
          python - <<'EOF'
          import json, os, sys
          from datetime import datetime, timezone

          queue_file = "data/upload_queue.json"
          if not os.path.exists(queue_file):
              print("No queue file found.")
              print("has_story=false", file=open(os.environ["GITHUB_OUTPUT"], "a"))
              sys.exit(0)

          queue  = json.loads(open(queue_file).read())
          now    = datetime.now(timezone.utc)
          hour   = now.hour

          # Match stories scheduled within a 2-hour window (handles GitHub cron drift)
          window = {hour, (hour - 1) % 24}
          pending = [e for e in queue if e.get("status") == "pending"
                     and e.get("scheduled_hour") in window]

          if not pending:
              # Fallback: pick oldest pending story regardless of hour
              pending = [e for e in queue if e.get("status") == "pending"]

          if not pending:
              print("No pending stories in queue.")
              print("has_story=false", file=open(os.environ["GITHUB_OUTPUT"], "a"))
              sys.exit(0)

          story = pending[0]
          print(f"Processing: {story['title'][:60]}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              print(f"has_story=true", file=f)
              print(f"story_path={story['story_path']}", file=f)
              print(f"story_id={story['story_id']}", file=f)
          EOF

      - name: Set up Python
        if: steps.check.outputs.has_story == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.has_story == 'true'
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        if: steps.check.outputs.has_story == 'true'
        run: sudo apt-get install -y ffmpeg

      - name: Restore YouTube token
        if: steps.check.outputs.has_story == 'true'
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: Generate video
        if: steps.check.outputs.has_story == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BLOG_URL:       ${{ secrets.BLOG_URL }}
          BRAND_NAME:     ${{ secrets.BRAND_NAME }}
          R2_PUBLIC_URL:  ${{ secrets.R2_PUBLIC_URL }}
        run: python mvp_run.py --no-telegram --story "${{ steps.check.outputs.story_path }}"

      - name: Upload to YouTube
        if: steps.check.outputs.has_story == 'true'
        run: python upload_youtube.py --story "${{ steps.check.outputs.story_path }}"

      - name: Mark story as done in queue
        if: steps.check.outputs.has_story == 'true'
        run: |
          python - <<'EOF'
          import json
          story_id = "${{ steps.check.outputs.story_id }}"
          queue = json.loads(open("data/upload_queue.json").read())
          for e in queue:
              if e["story_id"] == story_id:
                  e["status"] = "uploaded"
          open("data/upload_queue.json", "w").write(json.dumps(queue, indent=2))
          EOF

      - name: Save updated YouTube token
        if: steps.check.outputs.has_story == 'true'
        run: gh secret set YOUTUBE_TOKEN_JSON --body "$(cat youtube_token.json)"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit updated logs
        if: steps.check.outputs.has_story == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/upload_queue.json data/youtube_uploads.json
          git diff --staged --quiet || git commit -m "chore: mark story uploaded [skip ci]"
          git push

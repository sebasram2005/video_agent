name: Generate & Upload Video

on:
  push:
    paths:
      - 'data/stories_log.json'   # triggers when curator pushes a new story
  workflow_dispatch:               # manual trigger from GitHub UI

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Restore YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: Generate video
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BLOG_URL:       ${{ secrets.BLOG_URL }}
          BRAND_NAME:     ${{ secrets.BRAND_NAME }}
        run: python mvp_run.py --no-telegram

      - name: Upload to YouTube
        run: python upload_youtube.py

      - name: Save updated YouTube token
        run: |
          gh secret set YOUTUBE_TOKEN_JSON --body "$(cat youtube_token.json)"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit updated upload log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_uploads.json
          git diff --staged --quiet || git commit -m "chore: update upload log [skip ci]"
          git push
